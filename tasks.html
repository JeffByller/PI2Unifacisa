<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Tarefas - Gerenciador</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./global.css">
    <link rel="stylesheet" href="./app.css">
</head>
<body>
    <!-- Aplicação Principal -->
    <div class="app-layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>Gerenciador</h2>
            </div>
            <ul class="nav-links">
                <li><a href="tasks.html" id="nav-list" class="active">Lista de Tarefas</a></li>
                <li><a href="kanban.html" id="nav-kanban">Quadro Kanban</a></li>
            </ul>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn-secondary">Sair</button>
            </div>
        </nav>

        <!-- Conteúdo Principal -->
        <main class="main-content">
            <!-- View Lista -->
            <div id="list-view" class="view-section">
                <header class="app-header">
                    <h1>Minhas Tarefas</h1>
                    <p class="subtitle">O que você precisa focar hoje?</p>
                </header>

                <form id="task-form" class="task-form">
                    <div class="input-group flex-row">
                        <input type="text" id="task-input" placeholder="Adicione uma nova tarefa..." autocomplete="off" required>
                        <button type="submit" id="add-btn" aria-label="Adicionar tarefa">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="priority-selector">
                        <span class="priority-label">Prioridade:</span>
                        <label class="radio-label">
                            <input type="radio" name="priority" value="#3b82f6" checked>
                            <span class="radio-custom priority-low" title="Comum"></span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="priority" value="#eab308">
                            <span class="radio-custom priority-medium" title="Importante"></span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="priority" value="#ef4444">
                            <span class="radio-custom priority-high" title="Urgente"></span>
                        </label>
                    </div>
                </form>

                <div class="task-stats">
                    <span id="stats-text">0 tarefas pendentes</span>
                </div>

                <ul id="task-list" class="task-list">
                    <!-- Tarefas dinâmicas -->
                </ul>
            </div>
        </main>
    </div>

    <script src="./api.js"></script>
    <script src="./auth.js"></script>
    <script src="./tasks.js"></script>
</body>
</html>
