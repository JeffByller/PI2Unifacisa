<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador Minimalista - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./global.css">
    <link rel="stylesheet" href="./login.css">
</head>
<body>
    <!-- View de Login -->
    <div id="login-view" class="view-container">
        <div class="login-box">
            <div class="login-header">
                <h1>Gerenciador</h1>
                <p>Faça login para continuar</p>
            </div>
            <form id="login-form">
                <div class="input-group">
                    <input type="text" id="username" placeholder="Usuário (admin)" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Senha (admin123)" required>
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
                <p id="login-error" class="error-msg"></p>
            </form>
        </div>
    </div>

    <script src="./api.js"></script>
    <script src="./auth.js"></script>
    <script src="./login.js"></script>
</body>
</html>
